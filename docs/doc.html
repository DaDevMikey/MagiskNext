<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - Magisk Next</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .doc-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            background-color: var(--md-sys-color-background);
        }
        
        .doc-content h1 {
            font-size: 40px;
            margin-bottom: 24px;
            color: var(--md-sys-color-primary);
        }
        
        .doc-content h2 {
            font-size: 28px;
            margin-top: 40px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--md-sys-color-surface-container-highest);
        }
        
        .doc-content h3 {
            font-size: 20px;
            margin-top: 24px;
            margin-bottom: 12px;
            color: var(--md-sys-color-on-surface);
        }
        
        .doc-content p, .doc-content ul, .doc-content ol {
            margin-bottom: 16px;
            color: var(--md-sys-color-on-surface-variant);
            line-height: 1.7;
        }

        .doc-content ul, .doc-content ol {
            padding-left: 24px;
        }

        .doc-content li {
            margin-bottom: 8px;
        }

        .doc-content a {
            color: var(--md-sys-color-primary);
            text-decoration: none;
        }

        .doc-content a:hover {
            text-decoration: underline;
        }

        .doc-content pre {
            background-color: var(--md-sys-color-surface-container);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin-bottom: 24px;
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .doc-content code {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            background-color: var(--md-sys-color-surface-container-high);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--md-sys-color-on-surface);
        }

        .doc-content pre code {
            background-color: transparent;
            padding: 0;
            color: var(--md-sys-color-primary);
        }
        
        .doc-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 16px 0;
            box-shadow: var(--md-sys-elevation-1);
        }

        .doc-content blockquote {
            border-left: 4px solid var(--md-sys-color-primary);
            padding-left: 16px;
            margin-left: 0;
            margin-bottom: 16px;
            background-color: var(--md-sys-color-surface-container);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            color: var(--md-sys-color-on-surface);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--md-sys-color-on-surface-variant);
            text-decoration: none;
            margin-bottom: 24px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-button:hover {
            color: var(--md-sys-color-primary);
        }
        
        .error-message {
            text-align: center;
            padding: 40px;
            background: var(--md-sys-color-surface-container);
            border-radius: 16px;
            color: #ffb4ab; /* M3 Error color */
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span>Magisk Next</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="https://github.com/DaDevMikey/MagiskNext" target="_blank">GitHub</a></li>
        </ul>
    </nav>

    <main>
        <div class="doc-container">
            <a href="index.html" class="back-button">← Back to Home</a>
            <div id="content" class="doc-content">
                <!-- Markdown content will be loaded here -->
                <p>Loading documentation...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>Magisk Next &copy; 2026. A community fork of Magisk by topjohnwu.</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        const contentDiv = document.getElementById('content');

        if (!file) {
            contentDiv.innerHTML = '<div class="error-message"><h2>Error</h2><p>No document specified.</p></div>';
        } else {
            // Fetch the markdown file
            fetch(file)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Document not found');
                    }
                    return response.text();
                })
                .then(text => {
                    // Fix image paths: replace relative image paths for proper rendering
                    // E.g. "./images/device_info.png" -> "/MagiskNext/images/device_info.png" or just "images/device_info.png"
                    // But if doc.html is at root, "images/" works fine.
                    // Set title from the first H1 if available
                    const titleMatch = text.match(/^#\s+(.+)$/m);
                    if (titleMatch) {
                        document.title = titleMatch[1] + ' - Magisk Next';
                    }
                    
                    // Parse markdown to HTML
                    contentDiv.innerHTML = marked.parse(text);
                })
                .catch(error => {
                    contentDiv.innerHTML = `<div class="error-message"><h2>404</h2><p>Could not load ${file}. It might have been moved or deleted.</p></div>`;
                    console.error('Error fetching markdown:', error);
                });
        }
    </script>
</body>
</html>
